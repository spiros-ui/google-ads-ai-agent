<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Ads AI Agent — Campaign Performance Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232734;
    --border: #2e3345;
    --text: #e4e6ef;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --yellow: #fdcb6e;
    --orange: #e17055;
    --red: #d63031;
    --red-bg: rgba(214,48,49,0.12);
    --orange-bg: rgba(225,112,85,0.12);
    --yellow-bg: rgba(253,203,110,0.12);
    --green-bg: rgba(0,184,148,0.12);
    --blue-bg: rgba(108,92,231,0.12);
    --surface-hover: #2a2e3d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

  /* Header */
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .header h1 { font-size:18px; font-weight:600; }
  .header h1 span { color:var(--accent-light); }
  .header .updated { font-size:12px; color:var(--text-dim); }

  /* Tabs */
  .tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; overflow-x:auto; position:sticky; top:57px; z-index:99; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .tabs::-webkit-scrollbar { height:4px; }
  .tabs::-webkit-scrollbar-track { background:transparent; }
  .tabs::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .tab { padding:12px 20px; font-size:13px; font-weight:500; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; user-select:none; max-width:180px; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
  .tab:hover { color:var(--text); background:var(--surface2); }
  .tab.active { color:var(--accent-light); border-bottom-color:var(--accent); }

  /* Content */
  .content { max-width:1400px; margin:0 auto; padding:24px 32px; }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* Summary bar */
  .summary-bar { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
  .summary-stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 24px; flex:1; min-width:180px; }
  .summary-stat .label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px; }
  .summary-stat .value { font-size:26px; font-weight:700; }
  .summary-stat .sub { font-size:12px; color:var(--text-dim); margin-top:2px; }

  /* Account cards grid */
  .accounts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }
  .account-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; cursor:pointer; transition:all .2s; }
  .account-card:hover { border-color:var(--accent); background:var(--surface2); transform:translateY(-2px); }
  .account-card .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .account-card .card-name { font-size:15px; font-weight:600; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
  .account-card .card-metrics { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .account-card .card-metric { font-size:12px; color:var(--text-dim); }
  .account-card .card-metric strong { display:block; font-size:16px; color:var(--text); }
  .account-card .card-issues { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); font-size:12px; color:var(--text-dim); display:flex; gap:12px; flex-wrap:wrap; }

  /* Verdict pills */
  .verdict-pill { display:inline-block; padding:3px 12px; border-radius:12px; font-size:11px; font-weight:600; white-space:nowrap; }
  .verdict-healthy { background:var(--green-bg); color:var(--green); }
  .verdict-attention { background:var(--yellow-bg); color:var(--yellow); }
  .verdict-critical { background:var(--red-bg); color:var(--red); }
  .verdict-inactive { background:var(--surface2); color:var(--text-dim); }

  /* Severity pills */
  .pill { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; }
  .pill-critical { background:var(--red-bg); color:var(--red); }
  .pill-high { background:var(--orange-bg); color:var(--orange); }
  .pill-medium { background:var(--yellow-bg); color:var(--yellow); }
  .pill-low { background:var(--blue-bg); color:var(--accent-light); }
  .pill-type { background:var(--surface2); color:var(--text-dim); }

  /* Status dot */
  .status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .status-dot.green { background:var(--green); }
  .status-dot.yellow { background:var(--yellow); }
  .status-dot.red { background:var(--red); }
  .status-dot.grey { background:var(--text-dim); }

  /* Date picker — Google Ads style */
  .date-picker-wrap { position:relative; margin-bottom:24px; display:inline-block; }
  .date-picker-btn { display:inline-flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 16px; color:var(--text); font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; user-select:none; }
  .date-picker-btn:hover { border-color:var(--accent); background:var(--surface2); }
  .date-picker-btn.open { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .date-picker-btn svg { width:18px; height:18px; fill:none; stroke:var(--text-dim); stroke-width:2; flex-shrink:0; }
  .date-picker-btn .dp-arrow { width:10px; height:10px; stroke:var(--text-dim); stroke-width:2.5; transition:transform .2s; }
  .date-picker-btn.open .dp-arrow { transform:rotate(180deg); }
  .date-picker-dropdown { display:none; position:absolute; top:calc(100% + 6px); left:0; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.45); z-index:200; min-width:280px; max-height:360px; overflow:hidden; }
  .date-picker-dropdown.show { display:block; }
  .dp-presets { padding:8px 0; border-bottom:1px solid var(--border); }
  .dp-preset { display:block; width:100%; padding:9px 18px; border:none; background:none; color:var(--text-dim); font-size:13px; text-align:left; cursor:pointer; transition:background .1s; }
  .dp-preset:hover { background:var(--surface2); color:var(--text); }
  .dp-preset.selected { color:var(--accent-light); font-weight:600; background:var(--blue-bg); }
  .dp-dates { max-height:240px; overflow-y:auto; padding:4px 0; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .dp-dates::-webkit-scrollbar { width:5px; }
  .dp-dates::-webkit-scrollbar-track { background:transparent; }
  .dp-dates::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .dp-date { display:flex; align-items:center; justify-content:space-between; padding:9px 18px; font-size:13px; color:var(--text-dim); cursor:pointer; transition:background .1s; border:none; background:none; width:100%; text-align:left; }
  .dp-date:hover { background:var(--surface2); color:var(--text); }
  .dp-date.active { color:var(--accent-light); font-weight:600; background:var(--blue-bg); }
  .dp-date .dp-day { color:var(--text); font-weight:500; }
  .dp-date .dp-rel { font-size:11px; color:var(--text-dim); }
  .dp-section-label { padding:8px 18px 4px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); font-weight:600; }

  /* Campaign table */
  table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:8px; overflow:hidden; }
  thead th { background:var(--surface2); padding:10px 14px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); font-weight:600; border-bottom:1px solid var(--border); white-space:nowrap; }
  thead th.num { text-align:right; }
  tbody td { padding:10px 14px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  tbody td.num { text-align:right; font-variant-numeric:tabular-nums; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr.campaign-row { cursor:pointer; transition:background .15s; }
  tbody tr.campaign-row:hover { background:var(--surface-hover); }
  tbody tr.campaign-row.expanded { background:var(--surface2); }

  /* Diagnosis panel */
  .diagnosis-panel { display:none; }
  .diagnosis-panel.open { display:table-row; }
  .diagnosis-panel td { padding:0; background:var(--bg); }
  .diagnosis-inner { padding:20px 24px; border-left:3px solid var(--accent); margin:0 14px 0 14px; }

  /* Objective bar */
  .obj-bar { display:flex; gap:24px; flex-wrap:wrap; padding:12px 16px; background:var(--surface2); border-radius:8px; margin-bottom:16px; font-size:13px; }
  .obj-bar .obj-item { display:flex; gap:6px; align-items:center; }
  .obj-bar .obj-label { color:var(--text-dim); }
  .obj-bar .obj-value { font-weight:600; }
  .obj-bar .obj-no { color:var(--red); font-weight:700; }
  .obj-bar .obj-yes { color:var(--green); font-weight:700; }

  /* Impression share bar */
  .is-bar-container { margin-bottom:16px; }
  .is-bar-label { font-size:12px; color:var(--text-dim); margin-bottom:6px; font-weight:500; }
  .is-bar { display:flex; height:24px; border-radius:6px; overflow:hidden; background:var(--surface2); width:100%; }
  .is-bar .is-segment { display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; white-space:nowrap; overflow:hidden; }
  .is-bar .is-won { background:var(--accent); color:#fff; }
  .is-bar .is-budget { background:var(--orange); color:#fff; }
  .is-bar .is-rank { background:var(--yellow); color:#1a1d27; }
  .is-bar .is-other { background:var(--surface2); color:var(--text-dim); }
  .is-legend { display:flex; gap:16px; margin-top:6px; font-size:11px; color:var(--text-dim); }
  .is-legend-dot { width:8px; height:8px; border-radius:2px; display:inline-block; margin-right:4px; vertical-align:middle; }

  /* Issue cards */
  .issues-section { margin-bottom:16px; }
  .issues-section-title { font-size:13px; font-weight:600; margin-bottom:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
  .issue-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 18px; margin-bottom:10px; }
  .issue-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .issue-title { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:600px; }
  .issue-reasoning { font-size:13px; color:var(--text-dim); margin-bottom:10px; line-height:1.5; }
  .issue-action { background:var(--blue-bg); border:1px solid rgba(108,92,231,0.25); border-radius:6px; padding:10px 14px; font-size:13px; margin-bottom:6px; }
  .issue-action strong { color:var(--accent-light); }
  .issue-impact { font-size:12px; color:var(--green); font-weight:500; }

  /* Strengths */
  .strengths-section { margin-bottom:16px; }
  .strength-item { display:flex; gap:8px; padding:8px 0; font-size:13px; }
  .strength-item::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); margin-top:7px; flex-shrink:0; }
  .strength-title { font-weight:600; color:var(--green); }
  .strength-detail { color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:500px; }

  /* Keyword/search term mini-tables */
  .mini-table { font-size:12px; margin-top:8px; }
  .mini-table th { font-size:10px; padding:6px 10px; }
  .mini-table td { font-size:12px; padding:6px 10px; }

  /* Action items */
  .action-filters { display:flex; gap:12px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
  .filter-btn { padding:6px 16px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-size:13px; cursor:pointer; transition:all .15s; }
  .filter-btn:hover { background:var(--surface2); color:var(--text); }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .filter-select { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 12px; color:var(--text); font-size:13px; cursor:pointer; }
  .filter-select:focus { outline:none; border-color:var(--accent); }

  .action-group-label { font-size:12px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; padding:12px 0 8px; border-bottom:1px solid var(--border); margin-bottom:12px; margin-top:20px; }
  .action-group-label:first-of-type { margin-top:0; }

  .action-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin-bottom:10px; display:flex; align-items:flex-start; gap:16px; }
  .action-item .ai-info { flex:1; }
  .action-item .ai-pills { display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
  .action-item .ai-title { font-size:14px; font-weight:600; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .action-item .ai-desc { font-size:13px; color:var(--text-dim); margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .action-item .ai-meta { font-size:12px; color:var(--text-dim); }
  .action-item .ai-meta strong { color:var(--text); }
  .action-item .ai-buttons { display:flex; gap:8px; flex-shrink:0; align-items:center; }
  .btn { padding:7px 18px; border-radius:6px; border:none; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; }
  .btn-approve { background:var(--green); color:#fff; }
  .btn-approve:hover { background:#00a884; }
  .btn-reject { background:var(--surface2); color:var(--text-dim); border:1px solid var(--border); }
  .btn-reject:hover { background:var(--red-bg); color:var(--red); border-color:var(--red); }
  .btn-export { background:var(--accent); color:#fff; }
  .btn-export:hover { background:#5b4bd5; }
  .status-badge { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:600; }
  .status-approved { background:var(--green-bg); color:var(--green); }
  .status-rejected { background:var(--red-bg); color:var(--red); }

  /* Empty state */
  .empty-state { text-align:center; padding:80px 40px; color:var(--text-dim); }
  .empty-state h2 { font-size:20px; margin-bottom:8px; color:var(--text); }

  /* Responsive */
  @media (max-width:768px) {
    .header { padding:12px 16px; }
    .tabs { padding:0 16px; }
    .content { padding:16px; }
    .summary-bar { flex-direction:column; }
    .accounts-grid { grid-template-columns:1fr; }
    .action-item { flex-direction:column; }
    .action-item .ai-buttons { align-self:flex-end; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Google Ads <span>Performance Monitor</span></h1>
  <div class="updated" id="lastUpdated"></div>
</div>

<div class="tabs" id="tabsContainer"></div>

<div id="contentContainer"></div>

<script src="scripts/dashboard-core.js"></script>
<script src="scripts/dashboard-overview.js"></script>
<script src="scripts/dashboard-account.js"></script>
<script src="scripts/dashboard-actions.js"></script>
</body>
</html>
